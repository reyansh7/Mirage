# Phase 1 — Adaptive Honeypot infrastructure
# Isolated honeynet: SSH | HTTP | MySQL | Logging API | Postgres

services:
  postgres:
    image: postgres:16-alpine
    hostname: honeypot-postgres
    container_name: honeypot-postgres
    environment:
      POSTGRES_USER: honeypot
      POSTGRES_PASSWORD: honeypot
      POSTGRES_DB: honeypot_events
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./api/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      honeynet:
        ipv4_address: 172.28.0.2
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U honeypot -d honeypot_events"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ..
      dockerfile: docker/api/Dockerfile
    hostname: honeypot-api
    container_name: honeypot-api
    environment:
      DATABASE_URL: postgresql+asyncpg://honeypot:honeypot@172.28.0.2:5432/honeypot_events
      SSH_HOST: 172.28.0.11
      SSH_PORT: "22"
      WEB_HOST: 172.28.0.12
      WEB_PORT: "80"
      MYSQL_HOST: 172.28.0.13
      MYSQL_PORT: "3306"
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin123
    ports:
      - "8001:8000"
    networks:
      honeynet:
        ipv4_address: 172.28.0.10
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # Liveness only — decoys checked via /health after SSH/web/mysql are up
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/docs')"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  ssh:
    build:
      context: ./ssh
      dockerfile: Dockerfile
    hostname: build-server-01
    container_name: honeypot-ssh
    environment:
      LOG_API_URL: http://172.28.0.10:8000
      ROOT_PASSWORD: honeypot
      HONEYPOT_USER: admin
      HONEYPOT_PASSWORD: admin123
    ports:
      - "2222:22"
    networks:
      honeynet:
        ipv4_address: 172.28.0.11
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ssh_data:/var/log
    restart: unless-stopped

  web:
    build:
      context: ./http
      dockerfile: Dockerfile
    hostname: fake-web
    container_name: honeypot-web
    environment:
      LOG_API_URL: http://172.28.0.10:8000
    ports:
      - "8080:80"
    networks:
      honeynet:
        ipv4_address: 172.28.0.12
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  mysql:
    build:
      context: ./mysql
      dockerfile: Dockerfile
    hostname: fake-mysql
    container_name: honeypot-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: corporate
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin123
      LOG_API_URL: http://172.28.0.10:8000
    ports:
      - "3307:3306"
    networks:
      honeynet:
        ipv4_address: 172.28.0.13
    volumes:
      - mysql_data:/var/lib/mysql
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uadmin", "-padmin123"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    restart: unless-stopped

networks:
  honeynet:
    name: honeynet
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  postgres_data:
  mysql_data:
  ssh_data:
